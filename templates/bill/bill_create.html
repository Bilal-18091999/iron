{% extends 'base.html' %}
{% load static %}
{% block body_block %}

<div class="container-fluid py-4">

  <div class="d-flex justify-content-between align-items-center bg-white rounded shadow-sm px-4 py-3 mb-4">
    <h4 class="fw-semibold text-primary mb-0">Create New Bill</h4>
    <div id="datetime" class="text-muted small"></div>
  </div>

  <div class="card shadow border-0">
    <div class="card-body p-4">
      <form method="post" novalidate>
        {% csrf_token %}
        
        <div class="bg-light rounded border-start border-4 border-primary p-4 mb-4">
          <h6 class="fw-semibold text-primary mb-3">
            <i class="fas fa-store me-2"></i> Bill Information
          </h6>
          
          <div class="row g-4">
            <div class="col-lg-6">
              <label class="form-label fw-semibold">Store *</label>
              {{ form.store }}
              <small class="text-muted">Select the store</small>
            </div>
            {% comment %} <div class="col-lg-6">
              <label class="form-label fw-semibold">Customer Name</label>
              {{ form.customer_name }}
            </div>
            <div class="col-lg-6">
              <label class="form-label fw-semibold">Customer Phone</label>
              {{ form.customer_phone }}
            </div>
            <div class="col-lg-6">
              <label class="form-label fw-semibold">Discount (₹)</label>
              {{ form.discount }}
            </div>
            <div class="col-lg-6">
              <label class="form-label fw-semibold">Tax (₹)</label>
              {{ form.tax }}
            </div> {% endcomment %}
          </div>
        </div>

        <div class="d-flex justify-content-end gap-3">
          <a href="{% url 'bill_list' %}" class="btn btn-secondary px-4">Cancel</a>
          <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-save me-1"></i> Create Bill & Add Items
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function updateDateTime() {
  const now = new Date();
  document.getElementById("datetime").innerText = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateDateTime, 1000);
updateDateTime();
</script>

{% endblock %}
